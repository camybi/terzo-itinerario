<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terzo Itinerario – Padova Terme & Colli</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #B8975A;
    --gold-light: #D4B07A;
    --dark: #1A1A18;
    --cream: #F7F3EC;
    --cream-dark: #EDE7DB;
    --text: #2C2C2A;
    --text-muted: #7A7060;
  }
  body { background: var(--cream); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
  header { padding: 2.5rem 2rem 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
  .logo-label { font-family: 'Jost', sans-serif; font-weight: 500; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); }
  .logo-title { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; letter-spacing: 0.05em; color: var(--dark); line-height: 1.1; text-align: center; }
  .logo-title em { font-style: italic; color: var(--gold); }
  .divider { width: 40px; height: 1px; background: var(--gold); margin: 0.75rem auto; opacity: 0.6; }
  main { max-width: 540px; margin: 0 auto; padding: 1rem 1.5rem 4rem; }
  .article-title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 300; line-height: 1.2; color: var(--dark); margin-bottom: 0.5rem; text-align: center; }
  .article-subtitle { font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); text-align: center; margin-bottom: 2rem; }
  .intro { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; line-height: 1.8; color: var(--text-muted); text-align: center; margin-bottom: 2.5rem; font-style: italic; }
  .players-grid { display: flex; flex-direction: column; gap: 1rem; }
  .player-card { background: white; border: 1px solid var(--cream-dark); border-radius: 2px; padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 0.85rem; transition: border-color 0.3s, box-shadow 0.3s; animation: fadeUp 0.6s ease both; }
  .player-card:nth-child(1) { animation-delay: 0.1s; }
  .player-card:nth-child(2) { animation-delay: 0.2s; }
  .player-card:nth-child(3) { animation-delay: 0.3s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .player-card:hover { border-color: var(--gold-light); box-shadow: 0 4px 24px rgba(184,151,90,0.08); }
  .player-header { display: flex; align-items: center; gap: 0.85rem; }
  .lang-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; color: var(--dark); letter-spacing: 0.03em; }
  .lang-code { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-left: auto; }
  audio { width: 100%; height: 36px; outline: none; accent-color: var(--gold); }
  footer { text-align: center; padding: 2rem; }
  .footer-text { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); opacity: 0.6; }
  .gold-line { width: 1px; height: 40px; background: var(--gold); margin: 0 auto 1.5rem; opacity: 0.3; }
</style>
</head>
<body>
<header>
  <span class="logo-label">Guida autentica al territorio</span>
  <div class="logo-title">Padova <em>Terme & Colli</em></div>
  <div class="divider"></div>
</header>
<main>
  <h1 class="article-title">Terzo Itinerario</h1>
  <p class="article-subtitle">Ascolta l'articolo nella tua lingua</p>
  <p class="intro">Scegli la tua lingua e lasciati guidare alla scoperta del territorio.</p>
  <div class="players-grid">

    <div class="player-card">
      <div class="player-header">
        <svg width="28" height="20" viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="20" fill="#012169"/>
          <path d="M0 0L28 20M28 0L0 20" stroke="white" stroke-width="4"/>
          <path d="M0 0L28 20M28 0L0 20" stroke="#C8102E" stroke-width="2.5"/>
          <rect x="11" width="6" height="20" fill="white"/>
          <rect y="7" width="28" height="6" fill="white"/>
          <rect x="12" width="4" height="20" fill="#C8102E"/>
          <rect y="8" width="28" height="4" fill="#C8102E"/>
        </svg>
        <span class="lang-name">English</span>
        <span class="lang-code">EN</span>
      </div>
      <audio controls>
        <source src="https://raw.githubusercontent.com/camybi/terzo-itinerario/main/audio-en.mp3" type="audio/mpeg">
        Il tuo browser non supporta l'audio.
      </audio>
    </div>

    <div class="player-card">
      <div class="player-header">
        <svg width="28" height="20" viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg">
          <rect width="9.33" height="20" fill="#002395"/>
          <rect x="9.33" width="9.33" height="20" fill="white"/>
          <rect x="18.67" width="9.33" height="20" fill="#ED2939"/>
        </svg>
        <span class="lang-name">Français</span>
        <span class="lang-code">FR</span>
      </div>
      <audio controls>
        <source src="https://raw.githubusercontent.com/camybi/terzo-itinerario/main/audio-fr.mp3" type="audio/mpeg">
        Il tuo browser non supporta l'audio.
      </audio>
    </div>

    <div class="player-card">
      <div class="player-header">
        <svg width="28" height="20" viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg">
          <rect width="28" height="6.67" fill="#000"/>
          <rect y="6.67" width="28" height="6.67" fill="#D00"/>
          <rect y="13.33" width="28" height="6.67" fill="#FFCE00"/>
        </svg>
        <span class="lang-name">Deutsch</span>
        <span class="lang-code">DE</span>
      </div>
      <audio controls>
        <source src="https://raw.githubusercontent.com/camybi/terzo-itinerario/main/audio-de.mp3" type="audio/mpeg">
        Il tuo browser non supporta l'audio.
      </audio>
    </div>

  </div>
</main>
<footer>
  <div class="gold-line"></div>
  <p class="footer-text">Padova Terme & Colli · Biesse Edizioni · biessedizioni.it</p>
</footer>
</body>
</html>
